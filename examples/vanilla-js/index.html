<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AeroPivot JavaScript Pivot Table Example</title>
    <link rel="stylesheet" href="./aeropivot/pivot-themes.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }

      body {
        background: #f7f8fb;
        color: #171923;
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .page {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        height: 100%;
        padding: 1.5rem;
        box-sizing: border-box;
      }

      .pivot-shell {
        border: 1px solid #d9dee8;
        border-radius: 8px;
        flex: 1;
        min-height: 520px;
        overflow: hidden;
      }

      pivot-table {
        display: block;
        height: 100%;
        width: 100%;
      }
    </style>
    <script type="module" src="./aeropivot/pivot-table.es.js"></script>
  </head>
  <body>
    <main class="page">
      <header>
        <h1>AeroPivot JavaScript Pivot Table Example</h1>
        <p>Plain HTML integration using columnar browser-local ingestion.</p>
      </header>

      <section class="pivot-shell">
        <pivot-table
          id="pivot"
          class="pivot-theme-light"
          worker-path="./aeropivot/assets/pivot.worker.js">
        </pivot-table>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
